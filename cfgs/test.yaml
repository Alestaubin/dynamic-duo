TEST_DIR: ./data/ImageNet-C
VAL_DIR: ./data/imagenet/val
CALIBRATOR: 
  NAME: FixedTS
  TS: 1.109
  TL: 0.621
  CORRUPTIONS:
    - 'gaussian_blur'
    - 'saturate'
    - 'spatter'
    - 'speckle_noise'
  SEVERITIES: 
    - 1
    - 2
    - 3
    - 4
    - 5

LARGE: 
  NAME: vit_b_16
  BS: 128
  WORKERS: 8
  NORM: LN
  OPTIM:    
    METHOD: "Adam"
    STEPS: 1       # Tune this per model
    LR: 0.0001     # Tune this per model
    BETA: 0.9
    WD: 0.0
    # METHOD: "SGD"
    # STEPS: 1       # Tune this per model
    # LR: 0.001     # Tune this per model
    # MOMENTUM: 0.0
    # WD: 0.0
    # NESTEROV: false
    # DAMPENING: 0.0

SMALL: 
  NAME: resnet50
  BS: 128
  WORKERS: 8
  NORM: BN
  OPTIM:
    METHOD: "Adam"
    STEPS: 1       # Tune this per model
    LR: 0.00025     # Tune this per model
    BETA: 0.9
    WD: 0.0
    # METHOD: "SGD"
    # STEPS: 1       # Tune this per model
    # LR: 0.00025     # Tune this per model
    # MOMENTUM: 0.9
    # WD: 0.0
    # NESTEROV: false
    # DAMPENING: 0.0


EVAL:
  CORRUPTIONS:
    # - 'clean'
    - 'gaussian_blur'
    - 'saturate'
    - 'spatter'
    - 'speckle_noise'
    - 'brightness'
    - 'contrast'
    - 'defocus_blur'
    - 'elastic_transform'
    - 'fog'
    - 'frost'
    - 'gaussian_noise'
    - 'glass_blur'
    - 'impulse_noise'
    - 'jpeg_compression'
    - 'motion_blur'
    - 'pixelate'
    - 'shot_noise'
    - 'snow'
    - 'zoom_blur'
  SEVERITIES:
    # - 1
    # - 2
    # - 3
    # - 4
    - 5
